<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Portal - Appointments</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; margin: 0; padding: 2rem; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #2d3748; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid #edf2f7; }
        th { background: #f8fafc; color: #64748b; font-weight: 600; }
        .status { padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.8rem; font-weight: 600; }
        .status-scheduled { background: #ebf8ff; color: #2b6cb0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Doctor Portal - My Appointments</h1>
        <p>Welcome, Dr. John Smith</p>
        <table>
            <thead>
                <tr>
                    <th>Patient Name</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Alice Johnson</td>
                    <td>2026-03-23 10:00 AM</td>
                    <td><span class="status status-scheduled">Scheduled</span></td>
                    <td><button>Write Prescription</button></td>
                </tr>
                <tr>
                    <td>Bob Anderson</td>
                    <td>2026-03-23 11:30 AM</td>
                    <td><span class="status status-scheduled">Scheduled</span></td>
                    <td><button>Write Prescription</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
