<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Clinic - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #333; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 0.5rem; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: #667eea; color: white; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #764ba2; }
        .role-selector { margin-bottom: 1rem; display: flex; justify-content: space-around; }
        .role-selector label { font-size: 0.9rem; color: #666; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Smart Clinic Login</h1>
        <div class="role-selector">
            <label><input type="radio" name="role" value="admin" checked> Admin</label>
            <label><input type="radio" name="role" value="doctor"> Doctor</label>
            <label><input type="radio" name="role" value="patient"> Patient</label>
        </div>
        <input type="text" id="email" placeholder="Email (e.g., admin@clinic.com)">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Sign In</button>
    </div>
    <script>
        function login() {
            const role = document.querySelector('input[name="role"]:checked').value;
            window.location.href = role + '.html';
        }
    </script>
</body>
</html>
