<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Portal - Search Doctor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; margin: 0; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #2d3748; }
        .search-box { display: flex; gap: 1rem; margin-bottom: 2rem; }
        input { flex: 1; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; }
        button { background: #4299e1; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 0.5rem; cursor: pointer; }
        .results { border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 1rem; }
        .doctor-card { padding: 1rem; border-bottom: 1px solid #edf2f7; display: flex; justify-content: space-between; align-items: center; }
        .doctor-card:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Patient Portal - Search Doctors</h1>
        <div class="search-box">
            <input type="text" placeholder="Search by name..." value="Smith">
            <button>Search</button>
        </div>
        <div class="results">
            <h3>Search Results</h3>
            <div class="doctor-card">
                <div>
                    <strong>Dr. John Smith</strong><br>
                    <small>Cardiology</small>
                </div>
                <button style="background: #48bb78;">Book Appointment</button>
            </div>
        </div>
    </div>
</body>
</html>
